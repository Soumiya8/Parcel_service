<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Parcel</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Parcel Management System</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="management.html">Management</a> 
            <a href="track.html" class="active">Track</a>
            <a href="deliveries.html">Deliveries</a>
        </div>
    </nav>

    <main class="container">
        <div class="search-section">
            <input type="text" id="trackId" placeholder="Enter Tracking ID (e.g. CHN0001)">
            <button onclick="trackParcel()" class="btn-primary">Track Parcel</button>
        </div>

        <div id="trackResult" class="card hidden">
            <h3>Parcel Details</h3>
            <div class="details-grid">
                <p><strong>Tracking ID:</strong> <span id="resId"></span></p>
                <p><strong>Status:</strong> <span id="resStatus"></span></p>
                <p><strong>Location:</strong> <span id="resLoc"></span></p>
                <p><strong>Date:</strong> <span id="resDate"></span></p>
                <hr class="full-width">
                <p><strong>Sender:</strong> <span id="resSender"></span></p>
                <p><strong>Sender Phone:</strong> <span id="resSPhone"></span></p>
                <p><strong>Receiver:</strong> <span id="resReceiver"></span></p>
                <p><strong>Receiver Phone:</strong> <span id="resRPhone"></span></p>
            </div>
        </div>
    </main>
    <script src="../static/script.js"></script>
</body>
</html>
