<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deliveries List</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Parcel Management System</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="management.html">Management</a> 
            <a href="track.html">Track</a>
            <a href="deliveries.html" class="active">Deliveries</a>
        </div>
    </nav>

    <main class="container-wide">
        <div class="filter-bar">
            <input type="text" id="filterDate" placeholder="Date (DD-MM-YYYY)">
            <input type="text" id="filterLocation" placeholder="Location Name">
            <button onclick="filterParcels()" class="btn-primary">Apply Filter</button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Tracking ID</th>
                        <th>Status</th>
                        <th>Location</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="deliveriesTableBody">
                    </tbody>
            </table>
            <div id="noResultMsg" class="hidden">No records found.</div>
        </div>
    </main>
    <script src="../static/script.js"></script>
</body>
</html>
